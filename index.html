<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sharks and Minnows</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦈</text></svg>">
</head>
<body>
  <div id="game-wrap">
    <canvas id="game" width="960" height="600"></canvas>

    <div id="hud" class="hidden">
      <div class="hud-item" id="hud-round">Round 1</div>
      <div class="hud-item hud-dash">
        <span class="hud-label">Dash</span>
        <div class="dash-meter"><div id="dash-fill"></div></div>
      </div>
      <div class="hud-item" id="hud-team">Minnows: 5</div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
